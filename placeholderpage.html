<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Auto-Battler RPG - Em Desenvolvimento</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo&family=Courier+Prime:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />
</head>
<body class="overflow-x-hidden">

  <div class="min-h-screen flex flex-col bg-[#0c192c] text-white">
    
    <div class="h-14 bg-[#0a1424] border-b-2 border-white/20 flex items-center px-6 justify-between shrink-0">
      <span class="font-['JetBrains_Mono'] font-bold text-sm tracking-wider text-[#f1c40f]">⚡ POKÉMON COMMAND SYSTEM</span>
      <span class="text-xs text-white/40">SECURE SESSION // OPERATOR: RED</span>
    </div>

    <div class="flex flex-1">
      
      <div class="w-56 bg-[#0a1424] border-r-2 border-white/10 p-4 flex flex-col gap-2 shrink-0">
        <div class="bg-[#1e3a5f]/40 p-3 border border-white/20 text-xs font-['JetBrains_Mono'] text-center text-[#f1c40f] mb-4">
          RANKING GLOBAL: #4
        </div>
        <div class="px-3 py-2 text-xs text-white/40 hover:text-white/80 transition-colors cursor-pointer" onclick="window.location.href='BattlePage.html'">⚔️ SIMULADOR</div>
        <div class="px-3 py-2 text-xs text-white/80 font-bold bg-[#1e3a5f] border-l-4 border-[#f1c40f]">👥 SQUAD CONTROL</div>
        <div class="px-3 py-2 text-xs text-white/40 hover:text-white/80 transition-colors cursor-pointer" onclick="window.location.href='HistoryPage.html'">📋 LOGS DE COMBATE</div>
      </div>

      <main class="flex-1 p-8 flex flex-col items-center justify-center">
        
        <div class="max-w-2xl w-full bg-[#1e3a5f] border-2 border-white p-8 text-center">
          
          <span
            class="material-symbols-outlined text-[#f1c40f] text-8xl mb-4"
            style="font-variation-settings: 'FILL' 1"
          >
            construction
          </span>
          
          <h1 class="font-['Courier_Prime'] text-3xl text-[#f1c40f] uppercase tracking-[0.1em] font-bold mb-4">
            SQUAD CONTROL
          </h1>
          
          <p class="font-['Arimo'] text-base text-[#bfecff] mb-8">
            Esta funcionalidade está em desenvolvimento. Em breve estará disponível!
          </p>
          
          <button
            onclick="window.location.href='LobbyPage.html'"
            class="border-2 border-[#f1c40f] text-[#f1c40f] px-6 py-3 font-['JetBrains_Mono'] text-sm hover:bg-[#f1c40f] hover:text-black transition-colors uppercase tracking-widest"
          >
            Voltar ao Lobby
          </button>
          
        </div>
      </main>
    </div>

    <div class="h-8 bg-[#0a1424] border-t border-white/10 flex items-center px-6 justify-between text-[10px] text-white/40 shrink-0">
      <span>SYSTEM STATUS: ENCRYPTED // LINK STABLE</span>
      <span>VITE MULTI-STREAM SIMULATOR V2.6</span>
    </div>

  </div>

</body>
</html>
