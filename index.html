<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Auto-Battler RPG - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0..1,0" />
</head>
<body class="overflow-x-hidden">

  <div class="min-h-screen flex items-center justify-center p-4 md:p-8 bg-[#0c192c]">
    
    <main class="w-full max-w-md bg-[#1e3a5f] border-2 border-white flex flex-col relative z-10">
      
      <header class="w-full border-b-2 border-white p-4 flex flex-col items-center justify-center bg-[#0f2744] text-center">
        <span class="material-symbols-outlined text-[#f1c40f] mb-2 text-5xl" style="font-variation-settings: 'FILL' 1">
          videogame_asset
        </span>
        <h1 class="font-['Courier_Prime'] text-2xl text-[#f1c40f] uppercase tracking-[0.05em] font-bold">
          POKÉMON
        </h1>
        <h2 class="font-['Courier_Prime'] text-lg text-white uppercase mt-1 font-bold">
          AUTO-BATTLER RPG
        </h2>
      </header>

      <form onsubmit="event.preventDefault(); window.location.hash = '/lobby';" class="p-8 flex flex-col gap-4">
        
        <div class="flex flex-col gap-2">
          <label for="username" class="font-['JetBrains_Mono'] text-xs font-medium text-[#f1c40f] uppercase">
            Nome do Treinador
          </label>
          <div class="relative w-full">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#bfecff]">
              person
            </span>
            <input
              id="username"
              name="username"
              type="text"
              placeholder="DIGITE SEU NOME..."
              required
              class="w-full bg-[#0f2744] border-2 border-white text-white font-['JetBrains_Mono'] text-xs py-3 pl-10 pr-4 focus:outline-none focus:border-[#f1c40f] focus:ring-0 transition-colors"
            />
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <label for="password" class="font-['JetBrains_Mono'] text-xs font-medium text-[#f1c40f] uppercase">
            Senha
          </label>
          <div class="relative w-full">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-[#bfecff]">
              key
            </span>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="********"
              required
              class="w-full bg-[#0f2744] border-2 border-white text-white font-['JetBrains_Mono'] text-xs py-3 pl-10 pr-4 focus:outline-none focus:border-[#f1c40f] focus:ring-0 transition-colors"
            />
          </div>
        </div>

        <div class="mt-4">
          <button
            type="submit"
            class="w-full bg-[#f1c40f] border-2 border-[#f1c40f] text-black font-['JetBrains_Mono'] text-sm font-bold py-3 uppercase hover:bg-transparent hover:text-[#f1c40f] transition-colors flex items-center justify-center gap-2 group"
          >
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">
              login
            </span>
            Acessar Arena
          </button>
        </div>
      </form>

      <footer class="p-4 border-t-2 border-white bg-[#0f2744] text-center">
        <a
          href="#"
          class="font-['JetBrains_Mono'] text-[10px] text-[#f1c40f] underline hover:text-[#bfecff] transition-colors uppercase tracking-widest"
        >
          Criar novo perfil de Treinador
        </a>
      </footer>
    </main>

    <div
      class="fixed inset-0 pointer-events-none opacity-10 z-0 bg-[linear-gradient(rgba(255,255,255,0.1)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.1)_1px,transparent_1px)]"
      style="background-size: 32px 32px;"
    ></div>
  </div>

</body>
</html>
